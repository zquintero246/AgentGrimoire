name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt

      # Validates every spell.json, loads the whole tree through
      # sanctum-engine's Tome.load_from_directory, and executes each spell.
      - name: Validate and execute the spellbook
        run: pytest -v
